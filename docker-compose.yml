version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trading_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading123}
      POSTGRES_DB: ${POSTGRES_DB:-trading_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading_network
    logging:
      driver: json-file
      options:
        tag: "trading_postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trading_network
    logging:
      driver: json-file
      options:
        tag: "trading_redis"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - trading_network
    logging:
      driver: json-file
      options:
        tag: "trading_backend"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading_frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - trading_network
    logging:
      driver: json-file
      options:
        tag: "trading_frontend"
    depends_on:
      - backend
    command: npm run dev

  signals-db:
    image: postgres:16-alpine
    container_name: trading_signals_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SIGNALS_DB_USER:-signals}
      POSTGRES_PASSWORD: ${SIGNALS_DB_PASSWORD:-signals123}
      POSTGRES_DB: signals_db
    volumes:
      - signals_db_data:/var/lib/postgresql/data
    networks:
      - trading_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signals -d signals_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  signals:
    image: ${SIGNALS_IMAGE:-ghcr.io/amraul/trading-platform-signals:latest}
    container_name: trading_signals
    restart: unless-stopped
    expose:
      - "8020"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${SIGNALS_DB_USER:-signals}:${SIGNALS_DB_PASSWORD:-signals123}@signals-db:5432/signals_db
      - BYBIT_TESTNET=${BYBIT_TESTNET:-false}
    networks:
      - trading_network
    logging:
      driver: json-file
      options:
        tag: "trading_signals"
    depends_on:
      signals-db:
        condition: service_healthy

  price-tracker:
    image: ${PRICE_TRACKER_IMAGE:-ghcr.io/amraul/trading-platform-price-tracker:latest}
    container_name: trading_price_tracker
    restart: unless-stopped
    expose:
      - "8010"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BYBIT_TESTNET=${BYBIT_TESTNET:-false}
    networks:
      - trading_network
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        tag: "trading_price_tracker"

  loki:
    image: grafana/loki:2.9.4
    container_name: trading_loki
    restart: unless-stopped
    expose:
      - "3100"
    volumes:
      - loki_data:/loki
    networks:
      - trading_network

  promtail:
    image: grafana/promtail:2.8.0
    container_name: trading_promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    networks:
      - trading_network
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.6.0
    container_name: trading_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=https://logs.hub-cargo.ru
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-lokiexplore-app
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-lokiexplore-app
    networks:
      - trading_network
    depends_on:
      - loki

networks:
  trading_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:
  signals_db_data:
