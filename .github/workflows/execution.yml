name: Execution Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/execution.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-execution

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/trading-platform

            REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            # Создаём .env из secrets
            {
              echo "POSTGRES_USER=${{ secrets.DB_USER }}"
              echo "POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}"
              echo "POSTGRES_DB=trading_db"
              echo "DATABASE_URL=${{ secrets.EXECUTION_DATABASE_URL }}"
              echo "REDIS_URL=${{ secrets.REDIS_URL }}"
              echo "SECRET_KEY=${{ secrets.SECRET_KEY }}"
              echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}"
              echo "BYBIT_TESTNET=false"
              echo "CRYPTORG_BASE_URL=https://api2.cryptorg.net"
              echo 'BACKEND_CORS_ORIGINS=["https://${{ secrets.DOMAIN }}"]'
              echo "NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN }}"
              echo "NEXT_PUBLIC_WS_URL=wss://${{ secrets.DOMAIN }}"
              echo "GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}"
              echo "PRICE_TRACKER_URL=http://price-tracker:8010/subscribe"
              echo "NEXT_PUBLIC_SIGNALS_URL=https://signals.hub-cargo.ru"
            } > .env

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull backend
            docker compose up -d --remove-orphans

            # Применяем миграции
            echo "Applying migrations..."
            docker compose exec -T backend alembic upgrade head

            # Статус
            docker compose ps
            echo "✅ Execution service deployed"
